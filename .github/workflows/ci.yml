name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cvc5
        uses: strata-org/Strata/.github/actions/install-cvc5@main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clone Strata-CLI
        run: git clone https://github.com/strata-org/Strata-CLI.git StrataCLI

      - name: Build Strata-CLI
        uses: leanprover/lean-action@v1
        with:
          build-args: strata
          test: false
          lake-package-directory: StrataCLI

      - name: Restore dependencies
        run: dotnet restore BoogieToStrata.sln

      - name: Build
        run: dotnet build BoogieToStrata.sln --no-restore

      - name: Run integration tests
        env:
          STRATA_VERIFIER_PATH: ${{ github.workspace }}/StrataCLI/.lake/build/bin/strata
        run: dotnet test IntegrationTests/BoogieToStrata.IntegrationTests.csproj --no-build --verbosity normal
